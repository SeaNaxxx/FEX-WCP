name: WCP (FEXCore)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      VERSION:
        description: Optional upstream FEX tag override
        required: false
        type: string
      LLVM_TAG:
        description: Optional llvm-mingw tag override
        required: false
        type: string
      FORCE_MODE:
        description: Force rebuild
        required: false
        default: false
        type: boolean

permissions:
  contents: write

defaults:
  run:
    shell: bash --noprofile --norc -Eeuo pipefail {0}

env:
  system32: '${system32}'
  BUILD_TYPE: Release
  UPSTREAM_REPO: FEX-Emu/FEX

jobs:
  build-wcp:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq zstd cmake ninja-build python3

      - name: Resolve version + llvm-mingw + PKG
        env:
          VERSION_INPUT: ${{ inputs.VERSION }}
          LLVM_TAG_INPUT: ${{ inputs.LLVM_TAG }}
        run: |
          if [[ -n "$VERSION_INPUT" ]]; then
            VER="$VERSION_INPUT"
          else
            VER=$(curl -fsSL "https://api.github.com/repos/${UPSTREAM_REPO}/releases/latest" | jq -r '.tag_name // empty')
            if [[ -z "$VER" ]]; then
              VER=$(curl -fsSL "https://api.github.com/repos/${UPSTREAM_REPO}/tags?per_page=1" | jq -r '.[0].name // empty')
            fi
            [[ -n "$VER" ]] || VER="0.0.0"
          fi
          VER="${VER#v}"

          if [[ -n "$LLVM_TAG_INPUT" ]]; then
            LLVM_RELEASE=$(curl -fsSL "https://api.github.com/repos/mstorsjo/llvm-mingw/releases/tags/${LLVM_TAG_INPUT}")
          else
            LLVM_RELEASE=$(curl -fsSL "https://api.github.com/repos/mstorsjo/llvm-mingw/releases/latest")
          fi
          LLVM_TAG=$(jq -r '.tag_name' <<< "$LLVM_RELEASE")
          ASSET_URL=$(jq -r 'first(.assets[] | select(.name | test("ucrt.*ubuntu.*x86_64\\.tar\\.xz$")) | .browser_download_url)' <<< "$LLVM_RELEASE")
          [[ -n "$ASSET_URL" ]] || (echo "No llvm-mingw x86_64 archive found for ${LLVM_TAG}" >&2; exit 1)

          COMMIT=$(git rev-parse --short=8 HEAD)
          BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "detached")
          SAFE_BRANCH=$(echo "$BRANCH" | tr '/' '-')

          if [[ "$BRANCH" == "main" ]]; then
            PKG="fexcore-${VER}-${COMMIT}"
          else
            PKG="fexcore-${VER}-${COMMIT}-${SAFE_BRANCH}"
          fi

          echo "VER=$VER" >> "$GITHUB_ENV"
          echo "LLVM_TAG=$LLVM_TAG" >> "$GITHUB_ENV"
          echo "LLVM_URL=$ASSET_URL" >> "$GITHUB_ENV"
          echo "COMMIT=$COMMIT" >> "$GITHUB_ENV"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"
          echo "PKG=$PKG" >> "$GITHUB_ENV"

      - name: Check existing release
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE_MODE: ${{ inputs.FORCE_MODE }}
        run: |
          if gh release view "$PKG" >/dev/null 2>&1 && [[ "$FORCE_MODE" != "true" ]]; then
            echo "SKIP_RELEASE=true" >> "$GITHUB_ENV"
          else
            echo "SKIP_RELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Download llvm-mingw
        if: env.SKIP_RELEASE != 'true'
        run: |
          curl -fsSL "$LLVM_URL" -o llvm-mingw.tar.xz
          mkdir llvm-mingw
          tar -xf llvm-mingw.tar.xz -C llvm-mingw --strip-components=1
          echo "$PWD/llvm-mingw/bin" >> "$GITHUB_PATH"

      - name: Update submodules
        if: env.SKIP_RELEASE != 'true'
        run: |
          git submodule sync --recursive
          git submodule update --init --depth 1

      - name: Clean install directory
        if: env.SKIP_RELEASE != 'true'
        run: rm -rf install

      - name: Build (wow64)
        if: env.SKIP_RELEASE != 'true'
        uses: ./.github/workflows/wine_build
        with:
          target: wow64

      - name: Build (arm64ec)
        if: env.SKIP_RELEASE != 'true'
        uses: ./.github/workflows/wine_build
        with:
          target: arm64ec

      - name: Create Package (WCP)
        if: env.SKIP_RELEASE != 'true'
        run: |
          mkdir -p pkg/system32
          SRC="$PWD/install/usr/lib/wine/aarch64-windows"

          cp "${SRC}/libarm64ecfex.dll" pkg/system32/libarm64ecfex.dll
          cp "${SRC}/libwow64fex.dll"   pkg/system32/libwow64fex.dll

          cat > pkg/profile.json << JSONEOF
          {
            "type": "FEXCore",
            "versionName": "${VER}-${COMMIT}",
            "versionCode": 0,
            "description": "FEXCore",
            "files": [
              { "source": "system32/libarm64ecfex.dll", "target": "${system32}/libarm64ecfex.dll" },
              { "source": "system32/libwow64fex.dll",   "target": "${system32}/libwow64fex.dll" }
            ]
          }
          JSONEOF

          cd pkg && tar --zstd -cf "../${PKG}.wcp" . && cd ..

      - name: Publish Release
        if: env.SKIP_RELEASE != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE_MODE: ${{ inputs.FORCE_MODE }}
        run: |
          if gh release view "$PKG" >/dev/null 2>&1; then
            if [[ "$FORCE_MODE" != "true" ]]; then exit 0; fi
            gh release delete "$PKG" --yes --cleanup-tag
          fi
          gh release create "$PKG" "${PKG}.wcp" \
            --title "$PKG" \
            --notes "FEXCore ${VER} (branch: ${BRANCH}, commit: ${COMMIT}) built with llvm-mingw ${LLVM_TAG}"
